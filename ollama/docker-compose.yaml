services:
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_CONTEXT_LENGTH=147456
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_GPU_LAYERS=999
      - OLLAMA_GPU_OVERHEAD=0
      - OLLAMA_KEEP_ALIVE=5
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_GPU=1
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      # If nvidia-smi fails, the container is marked unhealthy.
      test: ["CMD", "nvidia-smi", "-L"]
      interval: 30m
      timeout: 10s
      retries: 3
      start_period: 1m
    # Label required for Autoheal (if using filtered monitoring)
    labels:
      - "autoheal=true"

  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  autoheal:
    container_name: autoheal
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      # Monitor all containers with a healthcheck
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  ollama_data:
  open_webui_data:

